<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Сайт-візитка | Всеволод Кердман</title>
    
    <style>
        /* Стилі для всього фону сторінки */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Красивий сучасний шрифт */
            background-color: #f0f2f5; /* М'який сірий фон */
            display: flex;
            justify-content: center; /* Центруємо картку по горизонталі */
            align-items: center;     /* Центруємо картку по вертикалі */
            height: 100vh;           /* Розтягуємо фон на всю висоту екрана */
            margin: 0;
        }

        /* Стилі для самої картки-візитки */
        .card {
            background-color: #ffffff; /* Білий фон картки */
            padding: 30px;             /* Відступи всередині картки */
            border-radius: 15px;       /* Закруглені кути */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); /* Легка елегантна тінь */
            text-align: center;        /* Текст по центру */
            max-width: 350px;          /* Максимальна ширина картки */
            width: 100%;
        }

        /* Стилі для головного заголовка (твого імені) */
        h1 {
            color: #2c3e50;            /* Темно-синій колір тексту */
            margin-bottom: 5px;        /* Відступ знизу */
            font-size: 28px;
        }

        /* Стилі для підзаголовка (професія або статус) */
        .subtitle {
            color: #3498db;            /* Красивий блакитний колір */
            font-size: 18px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 20px;
        }

        /* Стилі для звичайного тексту */
        p {
            color: #7f8c8d;            /* Спокійний сірий колір тексту */
            line-height: 1.6;          /* Відстань між рядками, щоб легко читалося */
            font-size: 16px;
        }

        /* Стилі для кнопки зв'язку */
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #3498db; /* Блакитний фон кнопки */
            color: white;              /* Білий текст */
            text-decoration: none;     /* Прибираємо підкреслення посилання */
            border-radius: 5px;        /* Трохи закруглені кути */
            font-weight: bold;
            transition: 0.3s;          /* Плавна анімація при наведенні */
        }

        /* Ефект при наведенні курсору на кнопку */
        .btn:hover {
            background-color: #2980b9; /* Насиченіший колір при наведенні */
        }
    </style>
</head>
<body>

    <!-- Наша картка-візитка -->
    <div class="card">
        <!-- Твоє ім'я тепер головний заголовок сторінки -->
        <h1>Всеволод Кердман</h1>
        
        <!-- Підзаголовок -->
        <p class="subtitle">Веб Розробник</p>
        
        <!-- Текст про себе -->
        <p>Вітаю! Це мій перший персональний сайт-візитка. Я навчаюся створювати сучасні та красиві веб-сторінки за допомогою HTML та CSS.</p>
        
        <!-- Кнопка (поки що веде просто наверх сторінки "#") -->
        <a href="#" class="btn">Написати мені</a>
    </div>

</body>
</html>
